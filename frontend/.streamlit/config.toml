[theme]
base = "dark"
primaryColor = "#F59E0B"
backgroundColor = "#0B0B0E"
secondaryBackgroundColor = "#16161C"
textColor = "#FAFAFA"
font = "sans serif"

[server]
headless = true
runOnSave = false
fileWatcherType = "none"
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = false
